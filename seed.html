// ── Helpers ───────────────────────────────────────────────
function log(msg, type = 'info') {
  const box = document.getElementById('log');
  const d   = document.createElement('div');
  d.className = `log-item ${type}`;
  d.textContent = `[${new Date().toLocaleTimeString()}]  ${msg}`;
  box.appendChild(d);
  box.scrollTop = box.scrollHeight;
}
function setProgress(n) {
  document.getElementById('prog-bar').style.width = `${(n / PRODUCTS.length) * 100}%`;
  document.getElementById('s-done').textContent = n;
}

// ── Step 1: Delete all ────────────────────────────────────
window.deleteAll = async () => {
  const btn = document.getElementById('delete-btn');
  btn.disabled = true;
  btn.innerHTML = '<div class="spin"></div>  Deleting…';
  log('Fetching existing products…', 'warn');
  try {
    const snap = await getDocs(collection(db, 'products'));
    if (snap.empty) {
      log('Collection already empty — nothing to delete.', 'info');
      btn.innerHTML = '✓  Already Empty';
      btn.disabled = false;
      return;
    }
    log(`Deleting ${snap.size} products…`, 'warn');
    let batch = writeBatch(db), count = 0, total = 0;
    for (const d of snap.docs) {
      batch.delete(d.ref);
      count++; total++;
      if (count === 499) { await batch.commit(); batch = writeBatch(db); count = 0; }
    }
    if (count > 0) await batch.commit();
    log(`✓  Deleted ${total} products successfully.`, 'ok');
    btn.innerHTML = '✓  Step 1 Done — All Deleted';
  } catch (e) {
    log(`Error: ${e.message}`, 'err');
    btn.disabled = false;
    btn.innerHTML = '🗑️  Step 1 — Delete ALL Existing Products';
  }
};

// ── Step 2: Seed ──────────────────────────────────────────
window.seedAll = async () => {
  const btn = document.getElementById('seed-btn');
  btn.disabled = true;
  btn.innerHTML = '<div class="spin"></div>  Seeding products…';
  log(`Seeding ${PRODUCTS.length} products…`, 'info');
  let done = 0;
  for (const p of PRODUCTS) {
    try {
      await addDoc(collection(db, 'products'), {
        ...p,
        createdAt:  serverTimestamp(),
        sales: Math.floor(Math.random() * 200),
        views: Math.floor(Math.random() * 2000),
      });
      done++;
      setProgress(done);
      log(`✓  [${done}/${PRODUCTS.length}]  ${p.category}  —  ${p.name}`, 'ok');
    } catch (e) {
      log(`✗  ${p.name}: ${e.message}`, 'err');
    }
  }
  log(`🎉  Done! ${done} of ${PRODUCTS.length} products seeded.`, 'ok');
  btn.innerHTML = `✅  ${done} Products Seeded — Go check your store!`;
};
