<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page Not Found | LUXE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Sans:wght@300;400;500&family=Bebas+Neue&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--gold:#c9a96e;--gold-l:#e2c998;--bg:#080808;--bg2:#111;--cream:#f5f0e8;--gray-2:#b0b0b0;--gray-3:#5a5a5a;--black-4:#252525}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--cream);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;text-align:center;padding:2rem}
    .bg-grid{position:fixed;inset:0;background-image:linear-gradient(rgba(201,169,110,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(201,169,110,.03) 1px,transparent 1px);background-size:80px 80px;pointer-events:none}
    .orb{position:fixed;border-radius:50%;filter:blur(100px);opacity:.06;pointer-events:none}
    .orb1{width:600px;height:600px;background:var(--gold);top:-20%;left:-10%;animation:float 8s ease-in-out infinite}
    .orb2{width:400px;height:400px;background:#7c5c2a;bottom:-10%;right:-5%;animation:float 10s ease-in-out infinite reverse}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-30px)}}
    .logo{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:.2em;color:var(--cream);margin-bottom:3rem;opacity:.6}
    .logo span{color:var(--gold)}
    .num{font-family:'Bebas Neue',sans-serif;font-size:clamp(7rem,25vw,14rem);line-height:.85;letter-spacing:.05em;background:linear-gradient(135deg,var(--gold) 0%,var(--gold-l) 50%,var(--gold) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:shimmer 3s ease infinite;background-size:200%}
    @keyframes shimmer{0%{background-position:0%}50%{background-position:100%}100%{background-position:0%}}
    .title{font-family:'Cormorant Garamond',serif;font-size:clamp(1.4rem,4vw,2.5rem);font-weight:300;margin:1rem 0 .5rem;color:var(--cream)}
    .sub{font-size:.95rem;color:var(--gray-2);line-height:1.8;max-width:420px;margin:0 auto 2.5rem}
    .actions{display:flex;gap:.75rem;justify-content:center;flex-wrap:wrap;margin-bottom:3rem}
    .btn-gold{display:inline-flex;align-items:center;gap:.5rem;padding:.85rem 2rem;background:var(--gold);color:#080808;border:none;border-radius:4px;font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;text-decoration:none;transition:all .25s}
    .btn-gold:hover{background:var(--gold-l);transform:translateY(-2px);box-shadow:0 8px 24px rgba(201,169,110,.3)}
    .btn-outline{display:inline-flex;align-items:center;gap:.5rem;padding:.85rem 2rem;background:transparent;color:var(--gray-2);border:1px solid var(--black-4);border-radius:4px;font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;text-decoration:none;transition:all .25s}
    .btn-outline:hover{border-color:var(--gold);color:var(--gold)}
    .suggestions{display:flex;gap:.65rem;flex-wrap:wrap;justify-content:center}
    .tag{padding:.4rem .9rem;background:rgba(201,169,110,.06);border:1px solid rgba(201,169,110,.15);border-radius:20px;font-size:.78rem;color:var(--gold);text-decoration:none;transition:all .2s}
    .tag:hover{background:rgba(201,169,110,.12)}
    .search-hint{font-size:.72rem;color:var(--gray-3);margin-bottom:.85rem;letter-spacing:.06em;text-transform:uppercase}
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>

  <div class="logo">LU<span>X</span>E</div>
  <div class="num">404</div>
  <h1 class="title">Page Not Found</h1>
  <p class="sub">The page you're looking for has moved, been deleted, or never existed. Let's get you back to something beautiful.</p>

  <div class="actions">
    <a href="index.html" class="btn-gold"><i class="fa fa-home"></i> Back to Home</a>
    <a href="products.html" class="btn-outline"><i class="fa fa-shopping-bag"></i> Browse Shop</a>
  </div>

  <div class="search-hint">Popular categories</div>
  <div class="suggestions">
    <a href="products.html?cat=Jackets"     class="tag">🧥 Jackets</a>
    <a href="products.html?cat=Dresses"     class="tag">👗 Dresses</a>
    <a href="products.html?cat=Blazers"     class="tag">🪭 Blazers</a>
    <a href="products.html?cat=Accessories" class="tag">👜 Accessories</a>
    <a href="products.html?cat=Sale"        class="tag">🏷️ Sale</a>
  </div>

  <script>
    // Auto-redirect countdown (optional)
    let t = 15;
    const btn = document.querySelector('.btn-gold');
    function tick(){
      if(t <= 0){ window.location.href='index.html'; return; }
      btn.innerHTML = `<i class="fa fa-home"></i> Home (${t}s)`;
      t--; setTimeout(tick, 1000);
    }
    setTimeout(tick, 1000);
  </script>
</body>
</html>
