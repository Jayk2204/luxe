<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — LUXE Admin</title>
  <link rel="stylesheet" href="css/admin.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
<div class="admin-layout">
<main class="main-content">
<div class="page-body" id="page-body" style="display:none">

  <!-- Stats -->
  <div class="stats-grid">
    <div class="stat-card" style="--accent:var(--blue);--icon-bg:var(--blue-g)">
      <div class="stat-card__top">
        <div class="stat-card__icon">💰</div>
        <span class="stat-card__trend trend-up">↑ Live</span>
      </div>
      <div class="stat-card__val" id="s-rev">₹—</div>
      <div class="stat-card__lbl">Total Revenue</div>
      <div class="stat-card__bar"><div class="stat-card__bar-fill" id="b-rev" style="width:0;background:var(--blue)"></div></div>
    </div>
    <div class="stat-card" style="--accent:var(--green);--icon-bg:var(--green-g)">
      <div class="stat-card__top">
        <div class="stat-card__icon">🛒</div>
        <span class="stat-card__trend trend-up">↑ Live</span>
      </div>
      <div class="stat-card__val" id="s-ord">—</div>
      <div class="stat-card__lbl">Total Orders</div>
      <div class="stat-card__bar"><div class="stat-card__bar-fill" id="b-ord" style="width:0;background:var(--green)"></div></div>
    </div>
    <div class="stat-card" style="--accent:var(--purple);--icon-bg:rgba(139,92,246,.12)">
      <div class="stat-card__top">
        <div class="stat-card__icon">👥</div>
        <span class="stat-card__trend trend-up">↑ Live</span>
      </div>
      <div class="stat-card__val" id="s-usr">—</div>
      <div class="stat-card__lbl">Registered Users</div>
      <div class="stat-card__bar"><div class="stat-card__bar-fill" id="b-usr" style="width:0;background:var(--purple)"></div></div>
    </div>
    <div class="stat-card" style="--accent:var(--amber);--icon-bg:var(--amber-g)">
      <div class="stat-card__top">
        <div class="stat-card__icon">📦</div>
        <span class="stat-card__trend trend-up">↑ Live</span>
      </div>
      <div class="stat-card__val" id="s-pro">—</div>
      <div class="stat-card__lbl">Active Products</div>
      <div class="stat-card__bar"><div class="stat-card__bar-fill" id="b-pro" style="width:0;background:var(--amber)"></div></div>
    </div>
  </div>

  <!-- Quick Actions + Recent Orders -->
  <div style="display:grid;grid-template-columns:1fr 300px;gap:1.25rem;margin-bottom:1.25rem" id="mid-grid">

    <!-- Recent Orders -->
    <div class="card">
      <div class="card-head">
        <span class="card-title"><i class="fa fa-receipt" style="color:var(--green)"></i> Recent Orders</span>
        <a href="orders.html" class="btn btn-sm btn-outline">View All</a>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>Order ID</th>
            <th>Customer</th>
            <th>Amount</th>
            <th>Status</th>
            <th class="hide-mobile">Date</th>
          </tr></thead>
          <tbody id="recent-orders">
            <tr><td colspan="5" style="text-align:center;padding:2.5rem">
              <div style="display:inline-block;width:20px;height:20px;border:2px solid var(--blue);border-top-color:transparent;border-radius:50%;animation:spin .7s linear infinite"></div>
            </td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Quick Actions -->
    <div class="card">
      <div class="card-head"><span class="card-title">⚡ Quick Actions</span></div>
      <div class="card-body" style="display:flex;flex-direction:column;gap:.65rem">
        <a href="products.html?action=add" class="btn btn-primary btn-block">
          <i class="fa fa-plus"></i> Add New Product
        </a>
        <a href="orders.html" class="btn btn-outline btn-block">
          <i class="fa fa-shopping-bag"></i> View All Orders
        </a>
        <a href="users.html" class="btn btn-outline btn-block">
          <i class="fa fa-users"></i> Manage Users
        </a>
        <a href="../admin/seed-images.html" class="btn btn-outline btn-block" style="color:var(--amber);border-color:rgba(245,158,11,.3)">
          <i class="fa fa-seedling"></i> Seed Products
        </a>
        <div style="padding-top:.65rem;border-top:1px solid var(--border);margin-top:.1rem">
          <div style="font-size:.65rem;color:var(--t3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:.55rem">Order Status</div>
          <div id="status-summary" style="display:flex;flex-direction:column;gap:.3rem"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Recent Users -->
  <div class="card">
    <div class="card-head">
      <span class="card-title"><i class="fa fa-user-plus" style="color:var(--purple)"></i> New Users</span>
      <a href="users.html" class="btn btn-sm btn-outline">View All</a>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>User</th>
          <th>Email</th>
          <th class="hide-mobile">Role</th>
          <th class="hide-mobile">Joined</th>
        </tr></thead>
        <tbody id="recent-users">
          <tr><td colspan="4" style="text-align:center;padding:2.5rem">
            <div style="display:inline-block;width:20px;height:20px;border:2px solid var(--purple);border-top-color:transparent;border-radius:50%;animation:spin .7s linear infinite"></div>
          </td></tr>
        </tbody>
      </table>
    </div>
  </div>

</div>
</main>
</div>

<div class="toast-container"></div>

<style>
  @media(min-width:900px){ #mid-grid { grid-template-columns: 1fr 300px !important; } }
  @media(max-width:899px){ #mid-grid { grid-template-columns: 1fr !important; } }
</style>

<script type="module">
import {
  requireAdmin, adminLogout, setActiveSidebarLink,
  getDashboardStats, getOrders, getUsers,
  formatCurrency, formatDate, timeAgo, statusBadge, showToast
} from './js/admin-firebase.js';
import { injectLayout } from './js/admin-layout.js';

injectLayout('Dashboard');

requireAdmin(async (user, profile) => {
  document.getElementById('page-body').style.display = 'block';

  // Sidebar counts + stats
  try {
    const stats = await getDashboardStats();
    animateVal('s-rev', stats.revenue, v => formatCurrency(v));
    animateVal('s-ord', stats.orders,  v => Math.round(v));
    animateVal('s-usr', stats.users,   v => Math.round(v));
    animateVal('s-pro', stats.products,v => Math.round(v));

    // Sidebar counts
    set('sb-products-count', stats.products);
    set('sb-orders-count',   stats.orders);
    set('sb-users-count',    stats.users);

    // Progress bars
    setTimeout(() => {
      ['b-rev','b-ord','b-usr','b-pro'].forEach((id,i) => {
        const widths = [72,58,84,45];
        const el = document.getElementById(id);
        if (el) el.style.width = widths[i] + '%';
      });
    }, 400);
  } catch (e) {
    showToast('Warning', 'Stats load failed. Check Firestore rules.', 'warning');
  }

  // Recent orders
  try {
    const orders = await getOrders();
    const tbody  = document.getElementById('recent-orders');
    if (!orders.length) {
      tbody.innerHTML = '<tr><td colspan="5"><div class="empty-state"><div class="empty-state__icon">🛒</div><p>No orders yet</p></div></td></tr>';
    } else {
      tbody.innerHTML = orders.slice(0,6).map(o => `
        <tr>
          <td><span style="font-family:var(--mono);font-size:.75rem;color:var(--blue)">#${o.id.slice(-6).toUpperCase()}</span></td>
          <td><strong>${o.shippingAddress?.name || o.userEmail || '—'}</strong></td>
          <td><strong style="color:var(--green)">${formatCurrency(o.total)}</strong></td>
          <td>${statusBadge(o.status)}</td>
          <td class="hide-mobile" style="font-size:.73rem;color:var(--t3)">${timeAgo(o.createdAt)}</td>
        </tr>`).join('');
    }

    // Status summary
    const counts = {};
    orders.forEach(o => { counts[o.status] = (counts[o.status]||0)+1; });
    const sumEl = document.getElementById('status-summary');
    sumEl.innerHTML = Object.entries(counts).map(([s,c]) => `
      <div style="display:flex;justify-content:space-between;align-items:center;font-size:.76rem">
        ${statusBadge(s)}
        <span style="color:var(--t2);font-family:var(--mono)">${c}</span>
      </div>`).join('') || '<div style="font-size:.78rem;color:var(--t3)">No orders yet</div>';
  } catch {}

  // Recent users
  try {
    const users = await getUsers();
    const tbody = document.getElementById('recent-users');
    if (!users.length) {
      tbody.innerHTML = '<tr><td colspan="4"><div class="empty-state"><div class="empty-state__icon">👥</div><p>No users yet</p></div></td></tr>';
    } else {
      tbody.innerHTML = users.slice(0,5).map(u => `
        <tr>
          <td>
            <div style="display:flex;align-items:center;gap:.6rem">
              <div class="user-av">${(u.displayName||u.email||'U').charAt(0).toUpperCase()}</div>
              <strong>${u.displayName || 'User'}</strong>
            </div>
          </td>
          <td style="font-size:.78rem">${u.email||'—'}</td>
          <td class="hide-mobile">
            ${u.role==='admin'
              ? '<span class="badge badge-blue">Admin</span>'
              : '<span class="badge badge-gray">Customer</span>'}
          </td>
          <td class="hide-mobile" style="font-size:.73rem;color:var(--t3)">${formatDate(u.createdAt)}</td>
        </tr>`).join('');
    }
  } catch {}
});

function set(id, val) { const e = document.getElementById(id); if(e) e.textContent = val; }

function animateVal(id, target, fmt) {
  const el = document.getElementById(id);
  if (!el) return;
  const dur = 1000, start = performance.now();
  (function step(now) {
    const p = Math.min((now-start)/dur, 1);
    const ease = 1 - Math.pow(1-p, 3);
    el.textContent = fmt(target * ease);
    if (p < 1) requestAnimationFrame(step);
  })(start);
}
</script>
</body>
</html>
