<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — LUXE</title>
  <link rel="stylesheet" href="css/admin.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div class="login-page">
  <div class="login-card">

    <div class="login-logo">
      <div class="ico">🛡️</div>
      <h1>LUXE <span style="color:var(--blue)">ADMIN</span></h1>
      <p>Authorized access only</p>
    </div>

    <div class="login-alert err" id="alert-err"><i class="fa fa-exclamation-circle"></i><span id="err-msg"></span></div>
    <div class="login-alert ok"  id="alert-ok"><i class="fa fa-check-circle"></i><span id="ok-msg"></span></div>

    <form id="login-form" onsubmit="doLogin(event)">
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <div class="fi-wrap">
          <input type="email" class="form-control fi-inp" id="email"
            placeholder="admin@example.com" required autocomplete="email">
          <i class="fi fa fa-envelope"></i>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="fi-wrap">
          <input type="password" class="form-control fi-inp" id="pass"
            placeholder="••••••••" required autocomplete="current-password">
          <i class="fi fa fa-lock"></i>
          <button type="button" class="fi-eye" onclick="toggleEye()">
            <i class="fa fa-eye" id="eye-ico"></i>
          </button>
        </div>
      </div>

      <button type="submit" class="btn btn-primary btn-block btn-lg" id="login-btn" style="margin-top:.5rem">
        <i class="fa fa-sign-in-alt"></i> Sign In to Admin
      </button>
    </form>

    <div style="text-align:center;margin-top:1.5rem">
      <a href="../index.html" style="font-size:.76rem;color:var(--t3)">
        <i class="fa fa-arrow-left"></i> Back to Store
      </a>
    </div>

  </div>
</div>

<script type="module">
import { auth, adminLogin, showToast, setLoading }
  from './js/admin-firebase.js';
import { onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const db = getFirestore();

// If already logged in as admin → go to dashboard
onAuthStateChanged(auth, async user => {
  if (!user) return;
  try {
    const snap = await getDoc(doc(db, 'users', user.uid));
    if (snap.data()?.role === 'admin') {
      window.location.href = 'dashboard.html';
    }
  } catch { /* not admin, stay */ }
});

window.doLogin = async (e) => {
  e.preventDefault();
  const btn   = document.getElementById('login-btn');
  const email = document.getElementById('email').value.trim();
  const pass  = document.getElementById('pass').value;
  hideAlerts();
  setLoading(btn, true, '<i class="fa fa-sign-in-alt"></i> Sign In to Admin');

  try {
    const cred = await adminLogin(email, pass);
    // Verify admin role
    const snap = await getDoc(doc(db, 'users', cred.user.uid));
    const data = snap.data();
    if (!data || data.role !== 'admin') {
      const { signOut } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js");
      await signOut(auth);
      showAlert('err', 'This account does not have admin access.');
      setLoading(btn, false, '<i class="fa fa-sign-in-alt"></i> Sign In to Admin');
      return;
    }
    showAlert('ok', 'Login successful! Redirecting to dashboard…');
    setTimeout(() => window.location.href = 'dashboard.html', 800);
  } catch (err) {
    const map = {
      'auth/user-not-found':     'No account found with this email.',
      'auth/wrong-password':     'Incorrect password.',
      'auth/invalid-credential': 'Invalid email or password.',
      'auth/too-many-requests':  'Too many attempts. Try again later.',
      'auth/invalid-email':      'Enter a valid email address.',
    };
    showAlert('err', map[err.code] || err.message);
    setLoading(btn, false, '<i class="fa fa-sign-in-alt"></i> Sign In to Admin');
  }
};

window.toggleEye = () => {
  const inp = document.getElementById('pass');
  const ico = document.getElementById('eye-ico');
  inp.type = inp.type === 'password' ? 'text' : 'password';
  ico.className = `fa fa-eye${inp.type === 'password' ? '' : '-slash'}`;
};

function showAlert(type, msg) {
  hideAlerts();
  const el = document.getElementById(`alert-${type}`);
  document.getElementById(`${type}-msg`).textContent = msg;
  el.style.display = 'flex';
}
function hideAlerts() {
  ['alert-err','alert-ok'].forEach(id => {
    document.getElementById(id).style.display = 'none';
  });
}
</script>
</body>
</html>
