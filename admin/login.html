<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — LUXE</title>
  <link rel="stylesheet" href="css/admin.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div class="login-page">
  <div class="login-card">

    <div class="login-logo">
      <div class="ico">🛡️</div>
      <h1>LUXE <span style="color:var(--blue)">ADMIN</span></h1>
      <p>Authorized access only</p>
    </div>

    <div class="login-alert err" id="alert-err" style="display:none">
      <i class="fa fa-exclamation-circle"></i><span id="err-msg"></span>
    </div>
    <div class="login-alert ok" id="alert-ok" style="display:none">
      <i class="fa fa-check-circle"></i><span id="ok-msg"></span>
    </div>

    <form id="login-form" onsubmit="doLogin(event)">
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <div class="fi-wrap">
          <input type="email" class="form-control fi-inp" id="email"
            placeholder="admin@example.com" required autocomplete="email">
          <i class="fi fa fa-envelope"></i>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="fi-wrap">
          <input type="password" class="form-control fi-inp" id="pass"
            placeholder="••••••••" required autocomplete="current-password">
          <i class="fi fa fa-lock"></i>
          <button type="button" class="fi-eye" onclick="toggleEye()">
            <i class="fa fa-eye" id="eye-ico"></i>
          </button>
        </div>
      </div>

      <button type="submit" class="btn btn-primary btn-block btn-lg" id="login-btn" style="margin-top:.5rem">
        <i class="fa fa-sign-in-alt"></i> Sign In to Admin
      </button>
    </form>

    <div style="text-align:center;margin-top:1.5rem">
      <a href="../index.html" style="font-size:.76rem;color:var(--t3)">
        <i class="fa fa-arrow-left"></i> Back to Store
      </a>
    </div>

  </div>
</div>

<script type="module">
import { initializeApp, getApps }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged,
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const FC = {
  apiKey:            "AIzaSyCBZTHSR66dnkUz2uibhrvmGoAvv18vFdM",
  authDomain:        "shopzz-ca17e.firebaseapp.com",
  projectId:         "shopzz-ca17e",
  storageBucket:     "shopzz-ca17e.firebasestorage.app",
  messagingSenderId: "158388352339",
  appId:             "1:158388352339:web:2c1016ed5c782ed6e6dda6",
};

// Use DEFAULT app — login.html is standalone, no other scripts run here.
// Named apps ('admin') cause 'No Firebase App [DEFAULT]' errors because
// Firebase Auth/Firestore internally still look up '[DEFAULT]' in some paths.
const app  = getApps().length === 0 ? initializeApp(FC) : getApps()[0];
const auth = getAuth(app);
const db   = getFirestore(app);

// If already logged in as admin → skip login, go straight to dashboard
onAuthStateChanged(auth, async user => {
  if (!user) return;
  try {
    const snap = await getDoc(doc(db, 'users', user.uid));
    if (snap.data()?.role === 'admin') {
      window.location.replace('dashboard.html');
    }
  } catch { /* not admin, stay on login */ }
});

window.doLogin = async (e) => {
  e.preventDefault();
  const btn   = document.getElementById('login-btn');
  const email = document.getElementById('email').value.trim();
  const pass  = document.getElementById('pass').value;
  hideAlerts();
  setLoad(btn, true);

  try {
    const { user } = await signInWithEmailAndPassword(auth, email, pass);

    // Verify admin role in Firestore
    const snap = await getDoc(doc(db, 'users', user.uid));
    const data = snap.data();

    if (!data || data.role !== 'admin') {
      await signOut(auth);
      showAlert('err', 'This account does not have admin access.');
      setLoad(btn, false);
      return;
    }

    showAlert('ok', 'Login successful! Redirecting to dashboard…');
    setTimeout(() => window.location.replace('dashboard.html'), 700);

  } catch (err) {
    const map = {
      'auth/user-not-found':     'No account found with this email.',
      'auth/wrong-password':     'Incorrect password.',
      'auth/invalid-credential': 'Invalid email or password.',
      'auth/too-many-requests':  'Too many attempts. Try again later.',
      'auth/invalid-email':      'Enter a valid email address.',
    };
    showAlert('err', map[err.code] || err.message);
    setLoad(btn, false);
  }
};

window.toggleEye = () => {
  const inp = document.getElementById('pass');
  const ico = document.getElementById('eye-ico');
  inp.type = inp.type === 'password' ? 'text' : 'password';
  ico.className = `fa fa-eye${inp.type === 'password' ? '' : '-slash'}`;
};

function showAlert(type, msg) {
  hideAlerts();
  document.getElementById(`${type}-msg`).textContent = msg;
  document.getElementById(`alert-${type}`).style.display = 'flex';
}
function hideAlerts() {
  document.getElementById('alert-err').style.display = 'none';
  document.getElementById('alert-ok').style.display  = 'none';
}
function setLoad(btn, on) {
  btn.disabled = on;
  btn.innerHTML = on
    ? '<span style="display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:_sp_ .7s linear infinite"></span><style>@keyframes _sp_{to{transform:rotate(360deg)}}</style>'
    : '<i class="fa fa-sign-in-alt"></i> Sign In to Admin';
}
</script>

</body>
</html>
