<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Users — LUXE Admin</title>
  <link rel="stylesheet" href="css/admin.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
<div class="admin-layout">
<main class="main-content">
<div class="page-body" id="page-body" style="display:none">

  <!-- Header -->
  <div style="display:flex;align-items:center;justify-content:space-between;gap:1rem;margin-bottom:1.5rem;flex-wrap:wrap">
    <div>
      <h2 style="font-size:1.15rem;font-weight:800">Users</h2>
      <p id="count-lbl" style="font-size:.76rem;color:var(--t3);margin-top:.1rem">Loading…</p>
    </div>
    <div style="display:flex;gap:.65rem;align-items:center;flex-wrap:wrap">
      <div class="search-wrap" style="max-width:220px">
        <i class="fa fa-search si"></i>
        <input type="text" id="search" placeholder="Search name / email…">
      </div>
      <select id="role-filter" class="form-control" style="width:auto;font-size:.8rem">
        <option value="">All Roles</option>
        <option value="admin">Admin</option>
        <option value="customer">Customer</option>
      </select>
    </div>
  </div>

  <!-- Stats -->
  <div id="user-stats" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:.75rem;margin-bottom:1.5rem"></div>

  <!-- Table -->
  <div class="card">
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>User</th>
          <th>Email</th>
          <th>Role</th>
          <th class="hide-mobile">Status</th>
          <th class="hide-mobile">Joined</th>
          <th style="text-align:right">Actions</th>
        </tr></thead>
        <tbody id="tbl-body">
          <tr><td colspan="6" style="text-align:center;padding:3rem">
            <div style="display:inline-block;width:22px;height:22px;border:2px solid var(--purple);border-top-color:transparent;border-radius:50%;animation:spin .7s linear infinite"></div>
          </td></tr>
        </tbody>
      </table>
    </div>
  </div>

</div>
</main>
</div>

<!-- USER DETAIL MODAL -->
<div class="modal-overlay" id="user-modal">
  <div class="modal" style="max-width:420px">
    <div class="modal-head">
      <h3>👤 User Details</h3>
      <button class="modal-close" onclick="CM('user-modal')">✕</button>
    </div>
    <div class="modal-body" id="user-modal-body"></div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="CM('user-modal')">Close</button>
      <button class="btn" id="user-action-btn"></button>
    </div>
  </div>
</div>

<div class="toast-container"></div>

<script type="module">
import {
  requireAdmin, adminLogout, setActiveSidebarLink,
  getUsers, makeAdmin, revokeAdmin, banUser, unbanUser,
  showToast, setLoading, debounce, formatDate
} from './js/admin-firebase.js';
import { injectLayout } from './js/admin-layout.js';

injectLayout('Users');

let all=[], selected=null;

requireAdmin(async (user, profile) => {
  const name=profile.displayName||user.email;
  document.getElementById('sidebar-user-name').textContent=name;
  document.getElementById('sidebar-avatar').textContent=name.charAt(0).toUpperCase();
  setActiveSidebarLink();
  document.getElementById('logout-btn').addEventListener('click',e=>{e.preventDefault();adminLogout();});
  document.getElementById('page-body').style.display='block';
  await load();
});

async function load() {
  try {
    all=await getUsers();
    renderStats(all);
    document.getElementById('count-lbl').textContent=`${all.length} users total`;
    render(all);
  } catch(e){ showToast('Error','Could not load users: '+e.message,'error'); }
}

function renderStats(users) {
  const admins=users.filter(u=>u.role==='admin').length;
  const banned=users.filter(u=>u.banned).length;
  document.getElementById('user-stats').innerHTML=`
    <div class="card" style="padding:1rem;border-top:2px solid var(--blue)">
      <div style="font-size:1.6rem;font-weight:800;font-family:var(--mono);color:var(--blue)">${users.length}</div>
      <div style="font-size:.65rem;color:var(--t3);text-transform:uppercase;letter-spacing:.1em;margin-top:.15rem">Total</div>
    </div>
    <div class="card" style="padding:1rem;border-top:2px solid var(--purple)">
      <div style="font-size:1.6rem;font-weight:800;font-family:var(--mono);color:var(--purple)">${admins}</div>
      <div style="font-size:.65rem;color:var(--t3);text-transform:uppercase;letter-spacing:.1em;margin-top:.15rem">Admins</div>
    </div>
    <div class="card" style="padding:1rem;border-top:2px solid ${banned>0?'var(--red)':'var(--green)'}">
      <div style="font-size:1.6rem;font-weight:800;font-family:var(--mono);color:${banned>0?'var(--red)':'var(--green)'}">${banned}</div>
      <div style="font-size:.65rem;color:var(--t3);text-transform:uppercase;letter-spacing:.1em;margin-top:.15rem">Banned</div>
    </div>`;
}

const COLORS=['#3b82f6','#8b5cf6','#10b981','#f59e0b','#ef4444','#06b6d4'];

function render(users) {
  const tb=document.getElementById('tbl-body');
  if(!users.length){
    tb.innerHTML=`<tr><td colspan="6"><div class="empty-state">
      <div class="empty-state__icon">👥</div><h3>No users found</h3>
      <p>Users appear here after they register.</p>
    </div></td></tr>`; return;
  }
  tb.innerHTML=users.map(u=>{
    const init=(u.displayName||u.email||'U').charAt(0).toUpperCase();
    const col=COLORS[init.charCodeAt(0)%COLORS.length];
    return `<tr class="fade-in">
      <td>
        <div style="display:flex;align-items:center;gap:.6rem">
          <div class="user-av" style="background:${col}">${init}</div>
          <div>
            <strong>${u.displayName||'User'}</strong>
            ${u.banned?'<div style="font-size:.62rem;color:var(--red)">⚠ Banned</div>':''}
          </div>
        </div>
      </td>
      <td style="font-size:.78rem;color:var(--t2)">${u.email||'—'}</td>
      <td>${u.role==='admin'?'<span class="badge badge-blue">Admin</span>':'<span class="badge badge-gray">Customer</span>'}</td>
      <td class="hide-mobile">${u.banned?'<span class="badge badge-red">Banned</span>':'<span class="badge badge-green">Active</span>'}</td>
      <td class="hide-mobile" style="font-size:.73rem;color:var(--t3);font-family:var(--mono)">${formatDate(u.createdAt)}</td>
      <td>
        <div style="display:flex;gap:.35rem;justify-content:flex-end">
          <button class="btn btn-icon" onclick="openUser('${u.id}')" title="Details"><i class="fa fa-eye"></i></button>
          <button class="btn btn-icon" style="color:var(--purple);border-color:rgba(139,92,246,.2)"
            onclick="toggleRole('${u.id}','${u.role||'customer'}')" title="${u.role==='admin'?'Revoke Admin':'Make Admin'}">
            <i class="fa fa-${u.role==='admin'?'user-minus':'user-shield'}"></i>
          </button>
          <button class="btn btn-icon" style="color:${u.banned?'var(--green)':'var(--red)'};border-color:${u.banned?'rgba(16,185,129,.2)':'rgba(239,68,68,.2)'}"
            onclick="toggleBan('${u.id}',${!!u.banned})" title="${u.banned?'Unban':'Ban'}">
            <i class="fa fa-${u.banned?'unlock':'ban'}"></i>
          </button>
        </div>
      </td>
    </tr>`;
  }).join('');
}

// Filter
const si=document.getElementById('search'), rf=document.getElementById('role-filter');
function filter(){
  const q=si.value.toLowerCase().trim(), r=rf.value;
  const f=all.filter(u=>(!q||(u.displayName||'').toLowerCase().includes(q)||(u.email||'').toLowerCase().includes(q))&&(!r||u.role===r));
  render(f);
  document.getElementById('count-lbl').textContent=`${f.length} of ${all.length} users`;
}
si?.addEventListener('input',debounce(filter,250));
rf?.addEventListener('change',filter);

// Toggle admin role
window.toggleRole=async(uid,role)=>{
  try {
    if(role==='admin'){ await revokeAdmin(uid); showToast('Role Updated','Admin revoked.','warning'); }
    else              { await makeAdmin(uid);   showToast('Role Updated','User is now Admin.','success'); }
    await load();
  } catch(e){ showToast('Error',e.message,'error'); }
};

// Toggle ban
window.toggleBan=async(uid,isBanned)=>{
  try {
    if(isBanned){ await unbanUser(uid); showToast('Unbanned','User restored.','success'); }
    else        { await banUser(uid);   showToast('Banned','User banned.','warning'); }
    await load();
  } catch(e){ showToast('Error',e.message,'error'); }
};

// User detail modal
window.openUser=id=>{
  const u=all.find(x=>x.id===id); if(!u) return;
  selected=u;
  const init=(u.displayName||u.email||'U').charAt(0).toUpperCase();
  const col=COLORS[init.charCodeAt(0)%COLORS.length];

  document.getElementById('user-modal-body').innerHTML=`
    <div style="text-align:center;margin-bottom:1.5rem">
      <div class="user-av" style="width:60px;height:60px;font-size:1.4rem;margin:0 auto .75rem;background:${col}">${init}</div>
      <h3 style="font-size:1.05rem">${u.displayName||'User'}</h3>
      <span class="badge ${u.role==='admin'?'badge-blue':'badge-gray'}" style="margin-top:.35rem">${u.role||'customer'}</span>
    </div>
    ${row('Email',u.email)}
    ${row('User ID',u.id.slice(0,16)+'…')}
    ${row('Status',u.banned?'🚫 Banned':'✅ Active')}
    ${row('Joined',formatDate(u.createdAt))}`;

  const btn=document.getElementById('user-action-btn');
  if(u.banned){
    btn.className='btn btn-success'; btn.innerHTML='✅ Unban User';
    btn.onclick=async()=>{ await toggleBan(u.id,true); CM('user-modal'); };
  } else {
    btn.className='btn btn-danger'; btn.innerHTML='🚫 Ban User';
    btn.onclick=async()=>{ await toggleBan(u.id,false); CM('user-modal'); };
  }
  OM('user-modal');
};

function row(label,val){
  return `<div style="display:flex;justify-content:space-between;padding:.55rem 0;border-bottom:1px solid var(--border);font-size:.82rem">
    <span style="color:var(--t3)">${label}</span>
    <span style="color:var(--t1)">${val||'—'}</span>
  </div>`;
}

window.OM=id=>document.getElementById(id)?.classList.add('open');
window.CM=id=>document.getElementById(id)?.classList.remove('open');
document.getElementById('user-modal')?.addEventListener('click',e=>{ if(e.target===e.currentTarget) CM('user-modal'); });
document.addEventListener('keydown',e=>{ if(e.key==='Escape') CM('user-modal'); });
</script>
</body>
</html>
