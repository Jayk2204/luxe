<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orders — LUXE Admin</title>
  <link rel="stylesheet" href="css/admin.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
<div class="admin-layout">
<main class="main-content">
<div class="page-body" id="page-body" style="display:none">

  <!-- Header -->
  <div style="display:flex;align-items:center;justify-content:space-between;gap:1rem;margin-bottom:1.5rem;flex-wrap:wrap">
    <div>
      <h2 style="font-size:1.15rem;font-weight:800">Orders</h2>
      <p id="count-lbl" style="font-size:.76rem;color:var(--t3);margin-top:.1rem">Loading…</p>
    </div>
    <div style="display:flex;gap:.65rem;align-items:center;flex-wrap:wrap">
      <div class="search-wrap" style="max-width:220px">
        <i class="fa fa-search si"></i>
        <input type="text" id="search" placeholder="Search order / email…">
      </div>
      <select id="status-filter" class="form-control" style="width:auto;font-size:.8rem">
        <option value="">All Statuses</option>
        <option value="pending">Pending</option>
        <option value="processing">Processing</option>
        <option value="shipped">Shipped</option>
        <option value="delivered">Delivered</option>
        <option value="cancelled">Cancelled</option>
      </select>
    </div>
  </div>

  <!-- Status stats -->
  <div id="status-stats" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:.65rem;margin-bottom:1.5rem"></div>

  <!-- Table -->
  <div class="card">
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>Order ID</th>
          <th>Customer</th>
          <th>Amount</th>
          <th>Status</th>
          <th class="hide-mobile">Payment</th>
          <th class="hide-mobile">Date</th>
          <th style="text-align:right">Action</th>
        </tr></thead>
        <tbody id="tbl-body">
          <tr><td colspan="7" style="text-align:center;padding:3rem">
            <div style="display:inline-block;width:22px;height:22px;border:2px solid var(--green);border-top-color:transparent;border-radius:50%;animation:spin .7s linear infinite"></div>
          </td></tr>
        </tbody>
      </table>
    </div>
  </div>

</div>
</main>
</div>

<!-- ORDER DETAIL MODAL -->
<div class="modal-overlay" id="order-modal">
  <div class="modal" style="max-width:580px">
    <div class="modal-head">
      <h3>🛒 Order Details</h3>
      <button class="modal-close" onclick="CM('order-modal')">✕</button>
    </div>
    <div class="modal-body" id="order-modal-body"></div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="CM('order-modal')">Close</button>
      <div style="display:flex;gap:.5rem;align-items:center">
        <select id="new-status" class="form-control" style="width:auto;font-size:.82rem">
          <option value="pending">Pending</option>
          <option value="processing">Processing</option>
          <option value="shipped">Shipped</option>
          <option value="delivered">Delivered</option>
          <option value="cancelled">Cancelled</option>
          <option value="refunded">Refunded</option>
        </select>
        <button class="btn btn-primary" id="upd-btn">
          <i class="fa fa-check"></i> Update
        </button>
      </div>
    </div>
  </div>
</div>

<div class="toast-container"></div>

<script type="module">
import {
  requireAdmin, adminLogout, setActiveSidebarLink,
  getOrders, updateOrderStatus,
  showToast, setLoading, debounce,
  formatCurrency, formatDate, timeAgo, statusBadge
} from './js/admin-firebase.js';
import { injectLayout } from './js/admin-layout.js';

injectLayout('Orders');

let all=[], current=null;

requireAdmin(async (user, profile) => {
  document.getElementById('page-body').style.display='block';
  await load();
});

async function load() {
  try {
    all=await getOrders();
    renderStats(all);
    document.getElementById('count-lbl').textContent=`${all.length} orders total`;
    render(all);
  } catch(e){ showToast('Error','Could not load orders: '+e.message,'error'); }
}

function renderStats(orders) {
  const cnt={pending:0,processing:0,shipped:0,delivered:0,cancelled:0};
  orders.forEach(o=>{ if(cnt[o.status]!==undefined) cnt[o.status]++; });
  const cfg={pending:{c:'var(--amber)',i:'⏳'},processing:{c:'var(--blue)',i:'⚙️'},shipped:{c:'var(--purple)',i:'🚚'},delivered:{c:'var(--green)',i:'✅'},cancelled:{c:'var(--red)',i:'❌'}};
  document.getElementById('status-stats').innerHTML=Object.entries(cnt).map(([s,n])=>`
    <div class="card" style="padding:.9rem;border-top:2px solid ${cfg[s].c}">
      <div style="font-size:1.2rem;margin-bottom:.25rem">${cfg[s].i}</div>
      <div style="font-size:1.35rem;font-weight:800;font-family:var(--mono);color:${cfg[s].c}">${n}</div>
      <div style="font-size:.65rem;color:var(--t3);text-transform:capitalize;margin-top:.1rem">${s}</div>
    </div>`).join('');
}

function render(orders) {
  const tb=document.getElementById('tbl-body');
  if(!orders.length){
    tb.innerHTML=`<tr><td colspan="7"><div class="empty-state">
      <div class="empty-state__icon">🛒</div><h3>No orders found</h3>
      <p>Orders will appear here once customers place them.</p>
    </div></td></tr>`; return;
  }
  tb.innerHTML=orders.map(o=>`
    <tr class="fade-in">
      <td>
        <span style="font-family:var(--mono);font-size:.76rem;color:var(--blue);cursor:pointer"
          onclick="openOrder('${o.id}')">#${o.id.slice(-6).toUpperCase()}</span>
      </td>
      <td>
        <div><strong>${o.shippingAddress?.name||o.userEmail||'—'}</strong></div>
        <div style="font-size:.7rem;color:var(--t3)">${o.userEmail||''}</div>
      </td>
      <td><strong style="color:var(--green)">${formatCurrency(o.total)}</strong></td>
      <td>${statusBadge(o.status)}</td>
      <td class="hide-mobile">
        <span class="badge badge-gray" style="text-transform:capitalize">${o.paymentMethod||'cod'}</span>
      </td>
      <td class="hide-mobile" style="font-size:.73rem;color:var(--t3);font-family:var(--mono)">${timeAgo(o.createdAt)}</td>
      <td>
        <button class="btn btn-icon" onclick="openOrder('${o.id}')" title="View"><i class="fa fa-eye"></i></button>
      </td>
    </tr>`).join('');
}

// Search + filter
const si=document.getElementById('search'), sf=document.getElementById('status-filter');
function filter() {
  const q=si.value.toLowerCase().trim(), s=sf.value;
  const f=all.filter(o=>(!q||o.id.toLowerCase().includes(q)||(o.userEmail||'').toLowerCase().includes(q)||(o.shippingAddress?.name||'').toLowerCase().includes(q))&&(!s||o.status===s));
  render(f);
  document.getElementById('count-lbl').textContent=`${f.length} of ${all.length} orders`;
}
si?.addEventListener('input',debounce(filter,250));
sf?.addEventListener('change',filter);

// Order detail modal
window.openOrder=id=>{
  const o=all.find(x=>x.id===id); if(!o) return;
  current=o;
  document.getElementById('new-status').value=o.status||'pending';

  document.getElementById('order-modal-body').innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1.25rem;flex-wrap:wrap;gap:1rem">
      <div>
        <div style="font-family:var(--mono);font-size:1rem;font-weight:700;color:var(--blue)">#${o.id.slice(-8).toUpperCase()}</div>
        <div style="font-size:.72rem;color:var(--t3);margin-top:.2rem">${formatDate(o.createdAt)}</div>
      </div>
      <div style="text-align:right">${statusBadge(o.status)}<div style="font-size:1.2rem;font-weight:800;color:var(--green);margin-top:.4rem">${formatCurrency(o.total)}</div></div>
    </div>

    <div style="background:var(--bg3);border-radius:var(--r);padding:.9rem;margin-bottom:.75rem">
      <div style="font-size:.62rem;text-transform:uppercase;letter-spacing:.1em;color:var(--t3);margin-bottom:.5rem">Customer</div>
      <strong>${o.shippingAddress?.name||o.userEmail||'—'}</strong>
      <div style="font-size:.78rem;color:var(--t2)">${o.userEmail||'—'}</div>
      ${o.shippingAddress?.phone?`<div style="font-size:.78rem;color:var(--t2)">${o.shippingAddress.phone}</div>`:''}
    </div>

    ${o.shippingAddress?`
    <div style="background:var(--bg3);border-radius:var(--r);padding:.9rem;margin-bottom:.75rem">
      <div style="font-size:.62rem;text-transform:uppercase;letter-spacing:.1em;color:var(--t3);margin-bottom:.5rem">Delivery Address</div>
      <div style="font-size:.82rem;color:var(--t2);line-height:1.7">
        ${o.shippingAddress['address-line1']||''} ${o.shippingAddress.address||''}<br>
        ${o.shippingAddress.city||''}, ${o.shippingAddress.state||''} — ${o.shippingAddress.pincode||o.shippingAddress.zip||''}
      </div>
    </div>`:'' }

    <div style="background:var(--bg3);border-radius:var(--r);padding:.9rem;margin-bottom:.75rem">
      <div style="font-size:.62rem;text-transform:uppercase;letter-spacing:.1em;color:var(--t3);margin-bottom:.6rem">Items (${o.items?.length||0})</div>
      ${(o.items||[]).map(i=>`
        <div style="display:flex;justify-content:space-between;padding:.45rem 0;border-bottom:1px solid var(--border);font-size:.82rem">
          <div>
            <strong>${i.name}</strong>
            ${i.variant?.size?`<span style="color:var(--t3);margin-left:.35rem">Size: ${i.variant.size}</span>`:''}
            <div style="color:var(--t3);font-size:.7rem">Qty: ${i.qty}</div>
          </div>
          <strong>${formatCurrency(i.price*i.qty)}</strong>
        </div>`).join('')||'<div style="font-size:.8rem;color:var(--t3)">No items</div>'}
    </div>

    <div style="background:var(--bg3);border-radius:var(--r);padding:.9rem">
      <div style="display:flex;justify-content:space-between;font-size:.8rem;margin-bottom:.35rem"><span style="color:var(--t3)">Subtotal</span><span>${formatCurrency(o.subtotal)}</span></div>
      <div style="display:flex;justify-content:space-between;font-size:.8rem;margin-bottom:.35rem"><span style="color:var(--t3)">Delivery</span><span>${o.shipping===0?'<span style="color:var(--green)">Free</span>':formatCurrency(o.shipping)}</span></div>
      ${o.codCharge>0?`<div style="display:flex;justify-content:space-between;font-size:.8rem;margin-bottom:.35rem"><span style="color:var(--t3)">COD Fee</span><span>${formatCurrency(o.codCharge)}</span></div>`:''}
      <div style="display:flex;justify-content:space-between;font-size:.95rem;font-weight:700;padding-top:.6rem;border-top:1px solid var(--border)"><span>Total</span><span style="color:var(--green)">${formatCurrency(o.total)}</span></div>
    </div>
  `;
  OM('order-modal');
};

document.getElementById('upd-btn').addEventListener('click',async()=>{
  if(!current) return;
  const btn=document.getElementById('upd-btn'), status=document.getElementById('new-status').value;
  setLoading(btn,true,'<i class="fa fa-check"></i> Update');
  try {
    await updateOrderStatus(current.id,status);
    showToast('Updated!',`Status set to "${status}".`,'success');
    CM('order-modal'); await load();
  } catch(e){ showToast('Error',e.message,'error'); }
  finally{ setLoading(btn,false,'<i class="fa fa-check"></i> Update'); }
});

window.OM=id=>document.getElementById(id)?.classList.add('open');
window.CM=id=>document.getElementById(id)?.classList.remove('open');
document.getElementById('order-modal')?.addEventListener('click',e=>{ if(e.target===e.currentTarget) CM('order-modal'); });
document.addEventListener('keydown',e=>{ if(e.key==='Escape') CM('order-modal'); });
</script>
</body>
</html>
