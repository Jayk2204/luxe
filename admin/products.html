<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products - LUXE Admin</title>
  <link rel="stylesheet" href="css/admin.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
<div class="admin-layout">
<main class="main-content">
<div class="page-body" id="page-body" style="display:none">

  <!-- ImageBB Key bar -->
  <div class="key-bar" id="key-bar">
    <i class="fa fa-key"></i>
    <span style="font-weight:600;white-space:nowrap">ImageBB Key:</span>
    <input type="text" id="imgbb-key" placeholder="Paste ImageBB API key here…" oninput="saveKey(this.value)">
    <a href="https://api.imgbb.com/" target="_blank" style="color:inherit;font-size:.75rem;white-space:nowrap;text-decoration:underline">Get Free Key ↗</a>
    <span id="key-st"></span>
  </div>

  <!-- Header -->
  <div style="display:flex;align-items:center;justify-content:space-between;gap:1rem;margin-bottom:1.5rem;flex-wrap:wrap">
    <div>
      <h2 style="font-size:1.15rem;font-weight:800">Products</h2>
      <p id="count-lbl" style="font-size:.76rem;color:var(--t3);margin-top:.1rem">Loading…</p>
    </div>
    <div style="display:flex;gap:.65rem;align-items:center;flex-wrap:wrap">
      <div class="search-wrap" style="max-width:240px">
        <i class="fa fa-search si"></i>
        <input type="text" id="search" placeholder="Search products…">
      </div>
      <select id="cat-filter" class="form-control" style="width:auto;font-size:.8rem">
        <option value="">All Categories</option>
        <option>Jackets</option><option>Dresses</option><option>Blazers</option>
        <option>Tops</option><option>Suits</option><option>Coats</option><option>Accessories</option>
      </select>
      <div style="display:flex;gap:.5rem">
        <button class="btn btn-outline btn-sm" id="btn-csv-prod" style="font-size:.75rem;color:var(--green);border-color:rgba(16,185,129,.3)" onclick="doExport('csv')">
          <i class="fa fa-file-csv"></i> CSV
        </button>
        <button class="btn btn-outline btn-sm" id="btn-pdf-prod" style="font-size:.75rem;color:var(--red);border-color:rgba(239,68,68,.3)" onclick="doExport('pdf')">
          <i class="fa fa-file-pdf"></i> PDF
        </button>
        <button class="btn btn-primary" id="add-btn"><i class="fa fa-plus"></i> Add Product</button>
      </div>
    </div>
  </div>

  <!-- Table -->
  <div class="card">
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>Image</th>
          <th>Product</th>
          <th>Category</th>
          <th>Price (₹)</th>
          <th class="hide-mobile">Stock</th>
          <th class="hide-mobile">Badge</th>
          <th style="text-align:right">Actions</th>
        </tr></thead>
        <tbody id="tbl-body">
          <tr><td colspan="7" style="text-align:center;padding:3rem">
            <div style="display:inline-block;width:22px;height:22px;border:2px solid var(--blue);border-top-color:transparent;border-radius:50%;animation:spin .7s linear infinite"></div>
          </td></tr>
        </tbody>
      </table>
    </div>
  </div>

</div>
</main>
</div>

<!-- ADD / EDIT MODAL -->
<div class="modal-overlay" id="prod-modal">
  <div class="modal" style="max-width:620px">
    <div class="modal-head">
      <h3 id="modal-title">Add Product</h3>
      <button class="modal-close" onclick="CM('prod-modal')">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="pid">

      <!-- Images -->
      <div class="form-group">
        <label class="form-label">Images <span style="text-transform:none;letter-spacing:0;font-weight:400;color:var(--t3)">(first = main photo · drag &amp; drop)</span></label>
        <div class="imgs-row" id="imgs-row"></div>
        <div class="img-drop" id="img-drop" style="margin-top:.65rem">
          <input type="file" id="img-file" accept="image/*" multiple>
          <div class="di">📸</div>
          <div class="dt"><strong>Click or drag</strong> to upload &nbsp;·&nbsp; JPG PNG WEBP</div>
          <div class="img-prog" id="img-prog"><div class="img-prog-bar" id="img-bar"></div></div>
          <div class="img-msg" id="img-msg"></div>
        </div>
        <div style="display:flex;gap:.5rem;align-items:center;margin-top:.5rem">
          <span style="font-size:.7rem;color:var(--t3);white-space:nowrap">Or URL:</span>
          <input type="url" class="form-control" id="url-inp" placeholder="https://i.ibb.co/…" style="font-size:.8rem;padding:.38rem .75rem">
          <button type="button" class="btn btn-sm btn-outline" onclick="addUrl()" style="white-space:nowrap"><i class="fa fa-plus"></i></button>
        </div>
      </div>

      <hr style="border-color:var(--border);margin:.75rem 0">

      <!-- Basic info -->
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Name *</label>
          <input type="text" class="form-control" id="pn" placeholder="Product name" required>
        </div>
        <div class="form-group">
          <label class="form-label">Category *</label>
          <select class="form-control" id="pc">
            <option value="">Select…</option>
            <option>Jackets</option><option>Dresses</option><option>Blazers</option>
            <option>Tops</option><option>Suits</option><option>Coats</option><option>Accessories</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Description</label>
        <textarea class="form-control" id="pd" placeholder="Product description…" rows="2"></textarea>
      </div>
      <div class="form-row form-row-3">
        <div class="form-group">
          <label class="form-label">Price (₹) *</label>
          <input type="number" class="form-control" id="pp" placeholder="1999" min="0" required>
        </div>
        <div class="form-group">
          <label class="form-label">Original Price (₹)</label>
          <input type="number" class="form-control" id="pop" placeholder="2999 (optional)" min="0">
        </div>
        <div class="form-group">
          <label class="form-label">Stock *</label>
          <input type="number" class="form-control" id="pst" placeholder="20" min="0" required>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Badge</label>
          <select class="form-control" id="pb">
            <option value="">None</option>
            <option value="New">🆕 New</option>
            <option value="Sale">🏷️ Sale</option>
            <option value="Hot">🔥 Hot</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Emoji (fallback)</label>
          <input type="text" class="form-control" id="pe" placeholder="🧥" maxlength="4">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Tags (comma separated)</label>
          <input type="text" class="form-control" id="ptags" placeholder="jacket, luxury">
        </div>
        <div class="form-group">
          <label class="form-label">Sizes (comma separated)</label>
          <input type="text" class="form-control" id="psz" placeholder="XS, S, M, L, XL">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Rating (0-5)</label>
          <input type="number" class="form-control" id="prat" placeholder="4.8" min="0" max="5" step="0.1">
        </div>
        <div class="form-group">
          <label class="form-label">Reviews Count</label>
          <input type="number" class="form-control" id="prev" placeholder="120" min="0">
        </div>
      </div>
      <div style="display:flex;gap:2rem;padding:.65rem 0;border-top:1px solid var(--border)">
        <label style="display:flex;align-items:center;gap:.45rem;cursor:pointer;font-size:.82rem">
          <input type="checkbox" id="pfeat" style="accent-color:var(--blue);width:15px;height:15px"> ⭐ Featured
        </label>
        <label style="display:flex;align-items:center;gap:.45rem;cursor:pointer;font-size:.82rem">
          <input type="checkbox" id="pact" checked style="accent-color:var(--green);width:15px;height:15px"> ✅ Active
        </label>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="CM('prod-modal')">Cancel</button>
      <button class="btn btn-primary" id="save-btn" onclick="saveProduct()">
        <i class="fa fa-save"></i> Save Product
      </button>
    </div>
  </div>
</div>

<!-- DELETE MODAL -->
<div class="modal-overlay" id="del-modal">
  <div class="modal" style="max-width:380px">
    <div class="modal-head">
      <h3 style="color:var(--red)">🗑️ Delete Product</h3>
      <button class="modal-close" onclick="CM('del-modal')">✕</button>
    </div>
    <div class="modal-body">
      <p style="color:var(--t2)">Delete <strong id="del-name" style="color:var(--t1)"></strong>?</p>
      <p style="color:var(--red);font-size:.78rem;margin-top:.5rem">⚠️ This cannot be undone.</p>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="CM('del-modal')">Cancel</button>
      <button class="btn btn-danger" id="del-btn"><i class="fa fa-trash"></i> Delete</button>
    </div>
  </div>
</div>

<div class="toast-container"></div>

<script type="module">
import {
  requireAdmin, adminLogout, setActiveSidebarLink,
  getProducts, getProduct, createProduct, editProduct, removeProduct,
  showToast, setLoading, debounce, formatCurrency
} from './js/admin-firebase.js';
import { injectLayout } from './js/admin-layout.js';

injectLayout('Products');

let all=[], editId=null, delId=null, imgs=[];

requireAdmin(async (user, profile) => {

  const k = localStorage.getItem('imgbb_key')||'';
  if (k) { document.getElementById('imgbb-key').value=k; applyKeyUI(k); }

  document.getElementById('page-body').style.display = 'block';
  if (new URLSearchParams(location.search).get('action')==='add') OM('prod-modal');
  await load();
});

// -- Key ---------------------------------------------------
window.saveKey = v => { localStorage.setItem('imgbb_key',v.trim()); applyKeyUI(v.trim()); };
function applyKeyUI(v) {
  const bar=document.getElementById('key-bar'), st=document.getElementById('key-st');
  if(v){ bar.classList.add('has-key'); st.textContent='✅ Saved'; }
  else { bar.classList.remove('has-key'); st.textContent=''; }
}

// -- Load --------------------------------------------------
async function load() {
  try {
    all = await getProducts();
    document.getElementById('count-lbl').textContent = `${all.length} products`;
    render(all);
  } catch(e) {
    showToast('Error','Could not load products: '+e.message,'error');
  }
}

function render(list) {
  const tb = document.getElementById('tbl-body');
  if (!list.length) {
    tb.innerHTML = `<tr><td colspan="7"><div class="empty-state">
      <div class="empty-state__icon">📦</div><h3>No products yet</h3>
      <p>Click "Add Product" to get started.</p>
    </div></td></tr>`; return;
  }
  tb.innerHTML = list.map(p => {
    const img = (p.images&&p.images[0])||p.imageUrl||'';
    return `<tr class="fade-in">
      <td>
        <div class="prod-thumb">
          ${img
            ? `<img src="${img}" alt="${p.name}" onerror="this.parentElement.innerHTML='${p.emoji||'📦'}'">` 
            : (p.emoji||'📦')}
        </div>
      </td>
      <td>
        <strong>${p.name}</strong>
        ${(p.tags||[]).length?`<div style="font-size:.66rem;color:var(--t3);margin-top:.1rem">${p.tags.slice(0,3).join(' · ')}</div>`:''}
      </td>
      <td><span class="badge badge-blue">${p.category||'-'}</span></td>
      <td>
        <strong>${formatCurrency(p.price)}</strong>
        ${p.originalPrice?`<div style="font-size:.68rem;color:var(--t3);text-decoration:line-through">${formatCurrency(p.originalPrice)}</div>`:''}
      </td>
      <td class="hide-mobile" style="font-family:var(--mono);color:${p.stock>10?'var(--green)':p.stock>0?'var(--amber)':'var(--red)'}">
        ${p.stock??0}
      </td>
      <td class="hide-mobile">
        ${p.badge?`<span class="badge ${p.badge==='New'?'badge-blue':p.badge==='Sale'?'badge-red':'badge-amber'}">${p.badge}</span>`:'<span style="color:var(--t3)">-</span>'}
      </td>
      <td>
        <div style="display:flex;gap:.35rem;justify-content:flex-end">
          <button class="btn btn-icon" onclick="openEdit('${p.id}')" title="Edit"><i class="fa fa-edit"></i></button>
          <button class="btn btn-icon" style="color:var(--red);border-color:rgba(239,68,68,.2)"
            onclick="openDel('${p.id}','${(p.name||'').replace(/'/g,'&#39;')}')" title="Delete">
            <i class="fa fa-trash"></i>
          </button>
        </div>
      </td>
    </tr>`;
  }).join('');
}

// -- Search + filter ---------------------------------------
const si = document.getElementById('search');
const cf = document.getElementById('cat-filter');
function filter() {
  const q=si.value.toLowerCase().trim(), c=cf.value;
  const f=all.filter(p=>(!q||p.name?.toLowerCase().includes(q)||(p.tags||[]).join(' ').toLowerCase().includes(q))&&(!c||p.category===c));
  render(f);
  document.getElementById('count-lbl').textContent=`${f.length} of ${all.length} products`;
}
si?.addEventListener('input', debounce(filter,250));
cf?.addEventListener('change', filter);

// -- Image upload (ImgBB) ----------------------------------
async function uploadImgBB(file) {
  const key = document.getElementById('imgbb-key').value.trim()||localStorage.getItem('imgbb_key')||'';
  if (!key) { showToast('Key Missing','Enter ImageBB API key!','error'); throw new Error('no key'); }
  const prog=document.getElementById('img-prog'), bar=document.getElementById('img-bar'), msg=document.getElementById('img-msg');
  prog.style.display='block'; msg.textContent=`⏳ Uploading ${file.name}…`;
  let pct=0; const t=setInterval(()=>{ pct=Math.min(pct+Math.random()*12,85); bar.style.width=pct+'%'; },200);
  try {
    const fd=new FormData(); fd.append('image',file); fd.append('key',key);
    const res=await fetch('https://api.imgbb.com/1/upload',{method:'POST',body:fd});
    const json=await res.json();
    clearInterval(t); if(!json.success) throw new Error(json.error?.message||'Failed');
    bar.style.width='100%'; msg.textContent='✅ Uploaded!';
    setTimeout(()=>{ prog.style.display='none'; bar.style.width='0'; msg.textContent=''; },1200);
    return json.data.url;
  } catch(e) { clearInterval(t); prog.style.display='none'; bar.style.width='0'; msg.textContent=''; throw e; }
}

document.getElementById('img-file').addEventListener('change', async e => {
  const files=Array.from(e.target.files); if(!files.length) return;
  document.getElementById('img-drop').style.pointerEvents='none';
  for (const f of files) {
    if(f.size>32*1024*1024){showToast('Too Large',f.name+' > 32MB','error');continue;}
    try { const url=await uploadImgBB(f); imgs.push(url); renderImgs(); showToast('Uploaded!',f.name,'success'); }
    catch(e){ showToast('Failed',e.message,'error'); }
  }
  document.getElementById('img-drop').style.pointerEvents='';
  e.target.value='';
});

const dz = document.getElementById('img-drop');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('over');});
dz.addEventListener('dragleave',()=>dz.classList.remove('over'));
dz.addEventListener('drop',async e=>{
  e.preventDefault(); dz.classList.remove('over');
  for(const f of Array.from(e.dataTransfer.files).filter(f=>f.type.startsWith('image/'))) {
    try{ const url=await uploadImgBB(f); imgs.push(url); renderImgs(); }catch{}
  }
});

window.addUrl = () => {
  const v=document.getElementById('url-inp').value.trim();
  if(!v||!v.startsWith('http')){showToast('Invalid','Must be a valid URL','error');return;}
  imgs.push(v); renderImgs(); document.getElementById('url-inp').value='';
};

function renderImgs() {
  document.getElementById('imgs-row').innerHTML = imgs.map((url,i) => `
    <div class="img-item ${i===0?'primary':''}">
      <img src="${url}" alt="img" onerror="this.src='https://placehold.co/68x82/1a2332/3b82f6?text=📦'">
      <button class="img-del" onclick="rmImg(${i})">✕</button>
    </div>`).join('') + (imgs.length?`<div style="font-size:.62rem;color:var(--blue);align-self:flex-end;padding-bottom:.2rem">🔵 = main</div>`:'');
}
window.rmImg = i => { imgs.splice(i,1); renderImgs(); };

// -- Modals ------------------------------------------------
window.OM = id => document.getElementById(id)?.classList.add('open');
window.CM = id => document.getElementById(id)?.classList.remove('open');

function resetForm() {
  ['pid','pn','pd','pp','pop','pst','pe','ptags','psz','prat','prev'].forEach(id=>{ const el=document.getElementById(id); if(el) el.value=''; });
  const pb=document.getElementById('pb'); if(pb) pb.value='';
  const pc=document.getElementById('pc'); if(pc) pc.value='';
  document.getElementById('pfeat').checked=false;
  document.getElementById('pact').checked=true;
  imgs=[]; renderImgs();
}

document.getElementById('add-btn').addEventListener('click',()=>{
  editId=null;
  document.getElementById('modal-title').textContent='➕ Add New Product';
  resetForm(); OM('prod-modal');
});

window.openEdit = async id => {
  editId=id;
  document.getElementById('modal-title').textContent='✏️ Edit Product';
  resetForm(); OM('prod-modal');
  const btn=document.getElementById('save-btn');
  setLoading(btn,true,'<i class="fa fa-save"></i> Save Product');
  try {
    const p=await getProduct(id); if(!p){showToast('Error','Not found','error');CM('prod-modal');return;}
    imgs=[...(p.images||[])]; if(!imgs.length&&p.imageUrl) imgs=[p.imageUrl]; renderImgs();
    document.getElementById('pid').value=id;
    document.getElementById('pn').value=p.name||'';
    document.getElementById('pc').value=p.category||'';
    document.getElementById('pd').value=p.description||'';
    document.getElementById('pp').value=p.price||'';
    document.getElementById('pop').value=p.originalPrice||'';
    document.getElementById('pst').value=p.stock??'';
    document.getElementById('pb').value=p.badge||'';
    document.getElementById('pe').value=p.emoji||'';
    document.getElementById('ptags').value=(p.tags||[]).join(', ');
    document.getElementById('psz').value=(p.sizes||[]).join(', ');
    document.getElementById('prat').value=p.rating||'';
    document.getElementById('prev').value=p.reviews||'';
    document.getElementById('pfeat').checked=!!p.featured;
    document.getElementById('pact').checked=p.active!==false;
  } catch(e){ showToast('Error',e.message,'error'); }
  finally { setLoading(btn,false,'<i class="fa fa-save"></i> Save Product'); }
};

window.saveProduct = async () => {
  const name=document.getElementById('pn').value.trim();
  const cat =document.getElementById('pc').value;
  const price=parseFloat(document.getElementById('pp').value);
  if(!name){showToast('Required','Product name required','error');return;}
  if(!cat) {showToast('Required','Select a category','error');return;}
  if(isNaN(price)||price<0){showToast('Required','Enter valid price','error');return;}

  const btn=document.getElementById('save-btn');
  setLoading(btn,true,'<i class="fa fa-save"></i> Save Product');

  const op=parseFloat(document.getElementById('pop').value);
  const data={
    name, category:cat,
    description:document.getElementById('pd').value.trim(),
    price,
    stock:parseInt(document.getElementById('pst').value)||0,
    badge:document.getElementById('pb').value||null,
    emoji:document.getElementById('pe').value.trim()||'📦',
    tags:document.getElementById('ptags').value.split(',').map(t=>t.trim()).filter(Boolean),
    sizes:document.getElementById('psz').value.split(',').map(s=>s.trim()).filter(Boolean),
    rating:parseFloat(document.getElementById('prat').value)||null,
    reviews:parseInt(document.getElementById('prev').value)||0,
    featured:document.getElementById('pfeat').checked,
    active:document.getElementById('pact').checked,
    images:[...imgs],
    imageUrl:imgs[0]||null,
  };
  if(!isNaN(op)&&op>0) data.originalPrice=op;

  try {
    if(editId){ await editProduct(editId,data); showToast('✅ Updated!',`"${data.name}" saved.`,'success'); }
    else       { await createProduct(data);      showToast('✅ Created!',`"${data.name}" added.`,'success'); }
    CM('prod-modal'); await load();
  } catch(e){ showToast('Error',e.message,'error'); }
  finally{ setLoading(btn,false,'<i class="fa fa-save"></i> Save Product'); }
};

window.openDel=(id,name)=>{ delId=id; document.getElementById('del-name').textContent=name; OM('del-modal'); };
document.getElementById('del-btn').addEventListener('click',async()=>{
  if(!delId)return;
  const btn=document.getElementById('del-btn');
  setLoading(btn,true,'<i class="fa fa-trash"></i> Delete');
  try{ await removeProduct(delId); showToast('Deleted!','Product removed.','success'); CM('del-modal'); await load(); }
  catch(e){ showToast('Error',e.message,'error'); }
  finally{ setLoading(btn,false,'<i class="fa fa-trash"></i> Delete'); delId=null; }
});

['prod-modal','del-modal'].forEach(id=>{ document.getElementById(id)?.addEventListener('click',e=>{ if(e.target===e.currentTarget) CM(id); }); });
document.addEventListener('keydown',e=>{ if(e.key==='Escape'){CM('prod-modal');CM('del-modal');} });
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.6.0/jspdf.plugin.autotable.min.js">
// == EXPORT (CSV + PDF) ==============================
const _ds = () => new Date().toISOString().slice(0,10);
const _esc = v => '"'+String(v==null?'':v).replace(/"/g,'""')+'"';
function _dlCSV(csv,fname){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'}));
  a.download=fname; a.click();
}
function _makeCSV(headers,rows){
  return '\uFEFF'+[headers.map(_esc),...rows.map(r=>r.map(_esc))].map(r=>r.join(',')).join('\r\n');
}

window.doExport = function(type) {
  if (!all.length) { alert('No data to export!'); return; }
  const rows = all.map((p,i) => [
    i+1, p.name||'', p.category||'', p.price||0,
    p.originalPrice||'', p.stock||0,
    (p.rating||0).toFixed(1), p.reviews||p.reviewCount||0,
    p.badge||'', p.featured?'Yes':'No'
  ]);
  const headers = ['#','Name','Category','Price (INR)','Orig. Price','Stock','Rating','Reviews','Badge','Featured'];

  if (type === 'csv') {
    _dlCSV(_makeCSV(headers, rows), 'LUXE_Products_'+_ds()+'.csv');
    return;
  }

  // PDF
  if (!window.jspdf) { alert('PDF library loading... try again in 2 seconds.'); return; }
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation:'landscape', unit:'mm', format:'a4' });
  const pw  = doc.internal.pageSize.getWidth();
  const ph  = doc.internal.pageSize.getHeight();
  doc.setFillColor(10,14,20); doc.rect(0,0,pw,22,'F');
  doc.setFillColor(201,169,110); doc.rect(0,22,pw,1.5,'F');
  doc.setFont('helvetica','bold'); doc.setFontSize(14); doc.setTextColor(245,240,232);
  doc.text('LUXE', 14, 14);
  doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(154,154,154);
  doc.text('Products Report', 28, 14);
  doc.text('Generated: '+new Date().toLocaleString('en-IN'), pw-14, 14, {align:'right'});
  doc.setFontSize(8); doc.text('Total products: '+all.length, 14, 29);
  doc.autoTable({
    head: [headers], body: rows, startY: 33,
    styles:{ font:'helvetica',fontSize:8,cellPadding:{top:3,bottom:3,left:3.5,right:3.5},lineColor:[30,35,50],lineWidth:0.3,textColor:[210,205,195],fillColor:[13,17,23] },
    headStyles:{ fillColor:[28,38,52],textColor:[201,169,110],fontStyle:'bold' },
    alternateRowStyles:{ fillColor:[18,24,32] },
    columnStyles:{ 0:{halign:'center',cellWidth:8} },
    margin:{ left:14, right:14 },
    didDrawPage: d => {
      const pg=d.pageNumber, tot=doc.internal.getNumberOfPages();
      doc.setFillColor(201,169,110); doc.rect(0,ph-3,pw,1.2,'F');
      doc.setFontSize(7); doc.setTextColor(80,85,100);
      doc.text('LUXE Admin - Confidential',14,ph-6);
      doc.text('Page '+pg+' of '+tot,pw-14,ph-6,{align:'right'});
    }
  });
  doc.save('LUXE_Products_'+_ds()+'.pdf');
};

</script>
